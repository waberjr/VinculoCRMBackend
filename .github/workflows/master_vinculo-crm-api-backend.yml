# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - vinculo-crm-api-backend

env:
  WEB_PROJECT: src/Web/Web.csproj

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Test with dotnet
        run: dotnet test --configuration Release --no-build --verbosity normal
        env:
          VINCULO_SKIP_FUNCTIONAL_TESTS: true

      - name: Install Entity Framework CLI
        run: |
          dotnet tool install --global dotnet-ef --version 10.*
          if ($LASTEXITCODE -ne 0) {
            dotnet tool update --global dotnet-ef --version 10.*
          }

      - name: Restore Entity Framework migration bundle runtime
        run: dotnet restore src/Infrastructure/Infrastructure.csproj --runtime win-x64

      - name: Generate Entity Framework migration bundle
        run: |
          dotnet ef migrations bundle `
            --configuration Release `
            --project src/Infrastructure/Infrastructure.csproj `
            --startup-project src/Infrastructure/Infrastructure.csproj `
            --context ApplicationDbContext `
            --runtime win-x64 `
            --self-contained `
            --output "${{ runner.temp }}/efbundle.exe" `
            --force

      - name: dotnet publish
        run: dotnet publish "${{ env.WEB_PROJECT }}" --configuration Release --output "${{ runner.temp }}/publish" --no-build

      - name: Package published app
        run: Compress-Archive -Path "${{ runner.temp }}/publish/*" -DestinationPath "${{ runner.temp }}/app.zip" -Force

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ runner.temp }}/app.zip

      - name: Upload Entity Framework migration bundle
        uses: actions/upload-artifact@v4
        with:
          name: ef-migrations-bundle
          path: ${{ runner.temp }}/efbundle.exe

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: app-package

      - name: Download Entity Framework migration bundle
        uses: actions/download-artifact@v4
        with:
          name: ef-migrations-bundle
          path: migration-bundle

      - name: Apply database migrations
        run: .\migration-bundle\efbundle.exe --connection "${{ secrets.VINCULO_BACKEND_DB_CONNECTION_STRING }}"
        env:
          ASPNETCORE_ENVIRONMENT: Production
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_96D3379A867740DC987FBE008A71A31F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4FBFC1D9FFF347779B9F6FD62920BDD2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1320E52D4A8A40FD83D899E3C6A5955D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vinculo-crm-api-backend'
          slot-name: 'Production'
          package: app-package/app.zip
          
